general{
    hide_cursor = false
    grace = 1

}
background {
    monitor =
    path=/home/s1dd/.config/rofi/images/gradient.png
    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    blur_passes = 4 # 0 disables blurring
    blur_size = 2
    new_optimizations = true
    ignore_opacity = false
    noise = 0.0117
     contrast = 1.3000
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 1.0

}

input-field {
    monitor =
    size = 265, 40
    outline_thickness = 3
    dots_size = 0.34 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.11 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgb(47, 28, 83)
    inner_color = rgb(246, 209, 253)
    font_color = rgb(10, 10, 10)
    check_color = rgb(204, 136, 34)
    fade_on_empty = true
    rounding = 12
    placeholder_text = <span foreground='##000000'>Enter Password</span> # Text rendered in the input box when it's empty.
    hide_input = false
    shadow_passes = 5
    shadow_size = 10
    shadow_color = rgba(0,0,0,0)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_color = rgb(0, 34, 34) # if authentication failed, changes outer_color and fail message color
    fail_transition = 300 # transition time in ms between normal outer_color and fail_color


    position = 0, 80
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date '+%A, %d %B')</span>"
    # text = cmd[update:1000] echo "<span foreground='##eeeeee'>$(date '+%A, %d %B')</span>"
    color = rgba(250, 250, 250, 0.8)
    font_size = 30
    font_family = JetBrains Mono Nerd Font

    position = 0, -330
    halign = center
    valign = top
}

